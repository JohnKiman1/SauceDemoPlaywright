name: Playwright Enterprise Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: E2E Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]

    steps:
      # =========================
      # Checkout Code
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Setup Node
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      # =========================
      # Install Dependencies
      # =========================
      - name: Install dependencies
        run: |
          npm install -g pnpm
          pnpm install

      # =========================
      # Install Playwright Browsers
      # =========================
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      # =========================
      # Run Tests (Sharded Execution)
      # =========================
      - name: Run Playwright tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}
        env:
          CI: true

      # =========================
      # Generate Allure Report
      # =========================
      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline --save-dev
          allure generate allure-results --clean -o allure-report

      # =========================
      # Upload Playwright Artifacts
      # =========================
      - name: Upload Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
            playwright/.auth/
          retention-days: 7

      # =========================
      # Upload Allure Report
      # =========================
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.shard }}
          path: allure-report/
          retention-days: 7