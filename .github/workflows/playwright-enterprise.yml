name: Playwright Enterprise Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  pages: write
  id-token: write

# ==========================================
# JOB 1: TEST EXECUTION (OPTIMIZED FARM)
# ==========================================
jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # NODE + CACHE
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # =========================
      # PLAYWRIGHT CACHE (FAST STARTUP)
      # =========================
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      # =========================
      # ENV SETUP
      # =========================
      - name: Create .env file
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          EOF

      - name: Ensure storage directory
        run: mkdir -p storage

      # =========================
      # TEST EXECUTION
      # =========================
      - name: Run Playwright tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2 --workers=2
        env:
          CI: true

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: allure-results/
          retention-days: 7


# ==========================================
# JOB 2: BUILD ALLURE REPORT (REAL HISTORY FIX)
# ==========================================
  allure-report:
    name: Allure Report (Merged)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # =========================
      # DOWNLOAD TEST RESULTS
      # =========================
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-shard-*
          path: allure-results-merged
          merge-multiple: true

      # =========================
      # 🔥 REAL HISTORY FROM GH-PAGES (FIXED APPROACH)
      # =========================
      - name: Restore Allure history from gh-pages
        if: github.ref == 'refs/heads/main'
        run: |
          git clone --depth=1 --branch=gh-pages https://github.com/${{ github.repository }} gh-pages-history || true
          mkdir -p allure-results-merged/history
          if [ -d "gh-pages-history/history" ]; then
            cp -r gh-pages-history/history/* allure-results-merged/history/ || true
          fi

      # =========================
      # GENERATE REPORT
      # =========================
      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results-merged --clean -o allure-report

      # =========================
      # SAVE UPDATED HISTORY
      # =========================
      - name: Extract history for next run
        run: |
          mkdir -p history-out
          cp -r allure-report/history/* history-out/ || true

      # =========================
      # UPLOAD REPORT
      # =========================
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7


# ==========================================
# JOB 3: DEPLOY TO GITHUB PAGES (FIXED + STABLE)
# ==========================================
  publish-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4