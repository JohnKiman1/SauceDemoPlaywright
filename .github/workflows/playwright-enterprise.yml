name: Playwright Test Platform (Enterprise Browser Strategy)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 * * * *"   # ⏰ every 1 hour (you asked for this)

permissions:
  contents: write
  pages: write
  id-token: write

env:
  IS_PR: ${{ github.event_name == 'pull_request' }}
  IS_MAIN: ${{ github.ref == 'refs/heads/main' }}
  IS_CRON: ${{ github.event_name == 'schedule' }}

jobs:

# ==========================================
# JOB 1: SETUP (SHARED CACHE)
# ==========================================
  setup:
    name: Setup (Browser Strategy)
    runs-on: ubuntu-latest

    outputs:
      browsers: ${{ steps.set-browsers.outputs.browsers }}

    steps:
      - uses: actions/checkout@v4

      - name: Decide browser strategy
        id: set-browsers
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "browsers=chromium" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "browsers=chromium firefox webkit" >> $GITHUB_OUTPUT
          else
            echo "browsers=chromium firefox" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Cache Playwright Browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.set-browsers.outputs.browsers }}

      - name: Install Browsers (strategy-aware)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install ${{ steps.set-browsers.outputs.browsers }}


# ==========================================
# JOB 2: DISTRIBUTED TEST FARM
# ==========================================
  test:
    name: Farm Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    needs: setup

    strategy:
      fail-fast: false
      matrix:
        node: [A, B, C]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # 🔥 IMPORTANT: install ONLY needed browsers
      - name: Install Playwright runtime (strategy-aware)
        run: |
          pnpm exec playwright install-deps
          pnpm exec playwright install ${{ needs.setup.outputs.browsers }}

      - name: Create env
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          EOF

      # =========================
      # TEST EXECUTION
      # =========================
      - name: Run tests (browser strategy mode)
        run: |
          pnpm exec playwright test \
            --workers=1 \
            --reporter=line,json
        env:
          CI: true
          FARM_NODE: ${{ matrix.node }}

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.node }}
          path: allure-results
          retention-days: 5


# ==========================================
# JOB 3: ALLURE + FLAKY DETECTION
# ==========================================
  allure-report:
    name: Allure Aggregation + Trends
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install PNPM + deps
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile --prefer-offline

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results

      # 🔥 TREND HISTORY (critical for flaky detection)
      - name: Restore history
        run: |
          git clone --depth=1 --branch=gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p allure-results/history
          cp -r gh-pages/history/* allure-results/history/ || true

      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results --clean -o allure-report

      - name: Save history
        run: |
          mkdir -p history-out
          cp -r allure-report/history/* history-out/ || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report


# ==========================================
# JOB 4: DEPLOY DASHBOARD
# ==========================================
  deploy:
    name: Deploy Test Platform Dashboard
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4