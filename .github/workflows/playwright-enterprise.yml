name: Playwright Test Platform (PR Preview System v2)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write


jobs:

# ==========================================
# JOB 1: TEST FARM (FIXED ARCHITECTURE)
# ==========================================
  test:
    name: Test Farm Shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - uses: actions/checkout@v4

      # =========================
      # NODE
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # PLAYWRIGHT CACHE (CRITICAL FIX)
      # =========================
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-v2-${{ hashFiles('**/pnpm-lock.yaml') }}

      # =========================
      # SINGLE SAFE INSTALL (NO DOUBLE INSTALLS)
      # =========================
      - name: Install Playwright browsers (safe)
        run: pnpm exec playwright install --with-deps

      # =========================
      # ENV
      # =========================
      - name: Create env
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          EOF

      # =========================
      # TEST EXECUTION
      # =========================
      - name: Run tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2 --workers=1
        env:
          CI: true

      # =========================
      # ARTIFACTS (IMPORTANT FOR PR PREVIEW)
      # =========================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results


# ==========================================
# JOB 2: ALLURE REPORT
# ==========================================
  allure:
    name: Allure Aggregation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: Validate results exist
        run: |
          test -d allure-results || (echo "No results" && exit 1)

      - name: Generate report
        run: pnpm exec allure generate allure-results --clean -o allure-report

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report


# ==========================================
# JOB 3: PR PREVIEW REPORT (FIXED)
# ==========================================
  pr-preview:
    name: PR Preview Report
    runs-on: ubuntu-latest
    needs: allure
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Deploy PR Preview (GitHub Pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: report
          destination_dir: pr-${{ github.event.pull_request.number }}