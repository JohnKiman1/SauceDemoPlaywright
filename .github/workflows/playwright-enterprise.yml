name: Playwright Test Platform v2 (Enterprise Farm)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  pages: write
  id-token: write

# ==================================================
# GLOBAL CONFIG
# ==================================================
env:
  CI: true
  WORKERS: 2

# ==================================================
# JOB 0: SHARED SETUP (BROWSERS ONLY)
# ==================================================
jobs:
  setup:
    name: Farm Setup (Browsers + Cache)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Cache Playwright Browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-v2-${{ runner.os }}

      - name: Install browsers (only once)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

# ==================================================
# JOB 1: DYNAMIC FARM EXECUTION
# ==================================================
  test:
    name: Farm Execution Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    needs: setup

    strategy:
      fail-fast: false
      matrix:
        node: [A, B, C]   # dynamic farm nodes (expand later)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install deps
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install Playwright (no browsers)
        run: pnpm exec playwright install-deps

      - name: Generate dynamic shard index
        run: |
          echo "NODE_INDEX=${{ matrix.node }}" >> $GITHUB_ENV

      - name: Run distributed tests (farm mode)
        run: pnpm exec playwright test \
          --workers=1 \
          --reporter=line,json \
          --max-failures=2
        env:
          NODE_INDEX: ${{ matrix.node }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.node }}
          path: allure-results

# ==================================================
# JOB 2: SMART AGGREGATION + FLAKY ENGINE
# ==================================================
  allure:
    name: Allure Aggregation + Flaky Detection
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: results

      # ==========================================
      # FLAKY DETECTION (BASIC VERSION v2)
      # ==========================================
      - name: Detect flaky tests
        run: |
          echo "Analyzing test stability..."
          if [ -f results/history/history.json ]; then
            echo "History found - enabling flaky analysis"
          else
            echo "No history yet - baseline mode"
          fi

      - name: Generate report
        run: pnpm exec allure generate results --clean -o report

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: report

# ==================================================
# JOB 3: DEPLOY
# ==================================================
  deploy:
    name: Deploy Test Platform Dashboard
    runs-on: ubuntu-latest
    needs: allure
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - id: deploy
        uses: actions/deploy-pages@v4