name: Playwright Enterprise Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ==========================================
  # JOB 1: RUN TESTS (SHARDED)
  # ==========================================
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      # =========================
      # Checkout Code
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Setup Node
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      # =========================
      # FIX: PNPM (COREPACK - ENTERPRISE STANDARD)
      # =========================
      - name: Enable Corepack
        run: corepack enable

      - name: Prepare PNPM
        run: corepack prepare pnpm@latest --activate

      # =========================
      # Install Dependencies
      # =========================
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # =========================
      # Install Playwright Browsers
      # =========================
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      # =========================
      # Ensure storage directory
      # =========================
      - name: Ensure storage directory
        run: mkdir -p storage

      # =========================
      # Run Tests (SHARD EXECUTION)
      # =========================
      - name: Run Playwright tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2
        env:
          CI: true
          BASE_URL: https://www.saucedemo.com
          USERNAME: standard_user
          PASSWORD: secret_sauce

      # =========================
      # Upload Allure Results
      # =========================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: allure-results/
          retention-days: 7


  # ==========================================
  # JOB 2: MERGED ALLURE REPORT
  # ==========================================
  allure-report:
    name: Allure Report (Merged)
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      # =========================
      # Checkout Code
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Setup Node
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # =========================
      # Enable PNPM (FIX)
      # =========================
      - name: Enable Corepack
        run: corepack enable

      - name: Prepare PNPM
        run: corepack prepare pnpm@latest --activate

      # =========================
      # Install Dependencies
      # =========================
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # =========================
      # Download Shards
      # =========================
      - name: Download Shard 1
        uses: actions/download-artifact@v4
        with:
          name: allure-results-shard-1
          path: allure-results-merged

      - name: Download Shard 2
        uses: actions/download-artifact@v4
        with:
          name: allure-results-shard-2
          path: allure-results-merged

      # =========================
      # Generate Allure Report
      # =========================
      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results-merged --clean -o allure-report

      # =========================
      # Upload Final Report
      # =========================
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7