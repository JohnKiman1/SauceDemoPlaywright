name: Playwright Test Platform (PR Preview System v1)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write   # 🔥 REQUIRED for PR comments

jobs:

# ==========================================
# JOB 1: SETUP (FAST + CLEAN)
# ==========================================
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest

    outputs:
      cache-key: ${{ steps.cache.outputs.key }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Cache Playwright
        id: cache
        run: echo "key=pw-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ steps.cache.outputs.key }}

      - name: Install browsers (single install)
        run: pnpm exec playwright install --with-deps


# ==========================================
# JOB 2: TEST FARM (FIXED ISOLATION)
# ==========================================
  test:
    name: Test Farm Shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Restore Playwright cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      # 🔥 CRITICAL FIX: NO SHARED AUTH
      - name: Create isolated env per shard
        run: |
          mkdir -p storage
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          SHARD=${{ matrix.shard }}
          EOF

      # =========================
      # RUN TESTS (SHARD SAFE)
      # =========================
      - name: Run tests
        run: pnpm exec playwright test \
          --shard=${{ matrix.shard }}/2 \
          --workers=1 \
          --retries=1
        env:
          CI: true

      # =========================
      # ARTIFACTS PER SHARD
      # =========================
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results


# ==========================================
# JOB 3: ALLURE AGGREGATION
# ==========================================
  report:
    name: Allure Aggregation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results

      - name: Validate
        run: test -d allure-results && ls allure-results

      - name: Generate report
        run: pnpm exec allure generate allure-results --clean -o allure-report

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report


# ==========================================
# JOB 4: PR PREVIEW DEPLOYMENT
# ==========================================
  deploy:
    name: PR Preview Report
    runs-on: ubuntu-latest
    needs: report
    if: always()

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      # 🔥 PR-specific folder
      - name: Create PR folder
        run: |
          mkdir -p public/pr-${{ github.event.pull_request.number || github.run_number }}
          cp -r report/* public/pr-${{ github.event.pull_request.number || github.run_number }}/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      # =========================
      # PR COMMENT (PREVIEW LINK)
      # =========================
      - name: Comment PR with report link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.issue.number;
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-${pr}/`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: `🧪 **Playwright PR Preview Ready**\n\n📊 Report: ${url}`
            });