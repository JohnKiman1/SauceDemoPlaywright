name: Playwright Test Platform (Enterprise Mode)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CI: true


jobs:

# ==========================================
# AUTH JOB
# ==========================================
  auth:
    name: Generate Auth State
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # ENV FIX
      - name: Set environment variables
        run: |
          echo "BASE_URL=https://www.saucedemo.com" >> $GITHUB_ENV
          echo "USERNAME=standard_user" >> $GITHUB_ENV
          echo "PASSWORD=secret_sauce" >> $GITHUB_ENV

      # FIX: install browsers once (no redundant deps install)
      - name: Install Playwright Browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Generate auth state
        run: pnpm exec playwright test --project=chromium --grep "@smoke" --workers=1
        env:
          CI: true

      - name: Upload auth state
        uses: actions/upload-artifact@v4
        with:
          name: auth-state
          path: storage/auth.json
          retention-days: 1


# ==========================================
# TEST JOB
# ==========================================
  test:
    name: Test Farm Shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: auth

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # ENV FIX
      - name: Set environment variables
        run: |
          echo "BASE_URL=https://www.saucedemo.com" >> $GITHUB_ENV
          echo "USERNAME=standard_user" >> $GITHUB_ENV
          echo "PASSWORD=secret_sauce" >> $GITHUB_ENV

      # FIX: install browsers (cached in CI)
      - name: Install Playwright Browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Download auth state
        uses: actions/download-artifact@v4
        with:
          name: auth-state
          path: storage

      # 🔥 CRITICAL FIX: ensure allure folder always exists
      - name: Ensure allure directory exists
        run: mkdir -p allure-results

      - name: Run tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2 --workers=1
        env:
          CI: true

      # FIX: always upload results even if tests fail
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results
          retention-days: 5


# ==========================================
# ALLURE REPORT
# ==========================================
  allure-report:
    name: Allure Aggregation
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM + deps
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile --prefer-offline

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      # FIX: prevent hard failure when empty
      - name: Validate results (safe mode)
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "⚠️ No Allure results found — skipping report generation"
            mkdir -p allure-results
          fi

      - name: Generate report
        run: pnpm exec allure generate allure-results --clean -o allure-report

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report


# ==========================================
# DEPLOY
# ==========================================
  deploy:
    name: Deploy Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        uses: actions/deploy-pages@v4