name: Playwright Test Platform (Enterprise Mode)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write


# ==========================================
# JOB 1: SETUP ENVIRONMENT (BROWSERS + CACHE)
# ==========================================
jobs:
  setup:
    name: Setup Playwright Environment
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # =========================
      # NODE
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # PLAYWRIGHT CACHE
      # =========================
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      # =========================
      # INSTALL BROWSERS ONCE
      # =========================
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit


# ==========================================
# JOB 2: TEST FARM (SHARDED EXECUTION)
# ==========================================
  test:
    name: Test Farm Shard ${{ matrix.shardIndex }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: setup

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]

    steps:
      - uses: actions/checkout@v4

      # =========================
      # NODE
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # RESTORE CACHE (NO REINSTALL)
      # =========================
      - name: Restore Playwright Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      # =========================
      # ENV
      # =========================
      - name: Create env
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          EOF

      # =========================
      # TEST EXECUTION (FIXED SHARD)
      # =========================
      - name: Run tests
        run: pnpm exec playwright test \
          --shard=${{ matrix.shardIndex }}/2 \
          --workers=1
        env:
          CI: true

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shardIndex }}
          path: allure-results
          retention-days: 5


# ==========================================
# JOB 3: ALLURE REPORT
# ==========================================
  allure-report:
    name: Allure Aggregation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM + deps
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile --prefer-offline

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      # =========================
      # VALIDATION SAFETY
      # =========================
      - name: Validate results exist
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results)" ]; then
            echo "❌ No Allure results found"
            exit 1
          fi

      # =========================
      # HISTORY (OPTIONAL BUT SAFE)
      # =========================
      - name: Restore history
        run: |
          git clone --depth=1 --branch=gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p allure-results/history
          cp -r gh-pages/history/* allure-results/history/ || true

      # =========================
      # GENERATE REPORT
      # =========================
      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results --clean -o allure-report

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report


# ==========================================
# JOB 4: DEPLOY REPORT (GITHUB PAGES)
# ==========================================
  deploy:
    name: Deploy Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4