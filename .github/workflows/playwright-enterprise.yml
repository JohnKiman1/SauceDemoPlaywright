name: Playwright Enterprise Test Farm (Stable Distributed CI)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

# ==========================================
# JOB 1: TEST FARM EXECUTION
# ==========================================
  test:
    name: Test Farm - Shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # NODE + FAST INSTALL
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # PLAYWRIGHT BROWSER CACHE (CRITICAL FOR SPEED)
      # =========================
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-v1-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers (safe install)
        run: pnpm exec playwright install chromium --with-deps

      # =========================
      # ISOLATED ENV PER SHARD (IMPORTANT FIX)
      # =========================
      - name: Create env (isolated)
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          SHARD_ID=${{ matrix.shard }}
          EOF

      # =========================
      # TEST EXECUTION (FARM MODE)
      # =========================
      - name: Run Tests (Shard Execution)
        run: pnpm exec playwright test \
              --shard=${{ matrix.shard }}/2 \
              --workers=2 \
              --reporter=list
        env:
          CI: true

      # =========================
      # ARTIFACT ISOLATION (CRITICAL FIX)
      # =========================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: allure-results/
          retention-days: 5


# ==========================================
# JOB 2: ALLURE MERGE ENGINE (FARM AGGREGATOR)
# ==========================================
  allure-report:
    name: Allure Farm Aggregation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # DOWNLOAD SHARDS SAFELY
      # =========================
      - name: Download All Shard Results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-shard-*
          path: allure-results
          merge-multiple: true

      # =========================
      # SAFETY CHECK (FIX EMPTY REPORT ISSUE)
      # =========================
      - name: Validate Results
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results)" ]; then
            echo "❌ No test results found from shards"
            exit 1
          fi

      # =========================
      # GENERATE REPORT
      # =========================
      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results --clean -o allure-report

      # =========================
      # ARTIFACT OUTPUT
      # =========================
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 7


# ==========================================
# JOB 3: DEPLOYMENT (SAFE GITHUB PAGES)
# ==========================================
  publish-report:
    name: Deploy Test Farm Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4