name: Playwright Test Platform (Enterprise Mode)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 * * * *"   # every hour

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

# ==========================================
# JOB 1: TEST FARM
# ==========================================
  test:
    name: Test Farm (${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        node: [1, 2]

    steps:
      - uses: actions/checkout@v4

      # =========================
      # NODE SETUP
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # BROWSER STRATEGY
      # =========================
      - name: Set browser strategy
        id: strategy
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "PROJECTS=chromium" >> $GITHUB_ENV
            echo "BROWSERS=chromium" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "PROJECTS=chromium firefox webkit" >> $GITHUB_ENV
            echo "BROWSERS=chromium firefox webkit" >> $GITHUB_ENV
          else
            echo "PROJECTS=chromium firefox" >> $GITHUB_ENV
            echo "BROWSERS=chromium firefox" >> $GITHUB_ENV
          fi

      # =========================
      # PLAYWRIGHT INSTALL (FIXED)
      # =========================
      - name: Install Playwright Browsers
        run: pnpm exec playwright install $BROWSERS

      # =========================
      # ENV
      # =========================
      - name: Create env
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          EOF

      # =========================
      # TEST EXECUTION (FIXED 🔥)
      # =========================
      - name: Run tests
        run: |
          CMD=""
          for p in $PROJECTS; do
            CMD="$CMD --project=$p"
          done

          pnpm exec playwright test \
            $CMD \
            --shard=${{ matrix.node }}/2 \
            --workers=1
        env:
          CI: true

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.node }}
          path: allure-results
          retention-days: 5


# ==========================================
# JOB 2: ALLURE REPORT
# ==========================================
  allure-report:
    name: Allure Aggregation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install PNPM + deps
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      # 🔥 history for flaky detection
      - name: Restore history
        run: |
          git clone --depth=1 --branch=gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p allure-results/history
          cp -r gh-pages/history/* allure-results/history/ || true

      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results --clean -o allure-report

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report


# ==========================================
# JOB 3: DEPLOY
# ==========================================
  deploy:
    name: Deploy Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4