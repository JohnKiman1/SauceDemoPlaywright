name: Playwright Enterprise Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# ✅ FIX: Node 24 migration
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ==========================================
  # JOB 1: TEST EXECUTION (SHARDED)
  # ==========================================
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # NODE SETUP (FIXED)
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22   # ✅ FIX (avoid deprecated behavior)
          cache: npm

      # =========================
      # PNPM INSTALL
      # =========================
      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Verify PNPM
        run: pnpm -v

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # =========================
      # PLAYWRIGHT BROWSERS (CRITICAL)
      # =========================
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      # =========================
      # ENV SETUP (NEW FIX)
      # =========================
      - name: Create .env file
        run: |
          echo "BASE_URL=https://www.saucedemo.com" >> .env
          echo "USERNAME=standard_user" >> .env
          echo "PASSWORD=secret_sauce" >> .env

      # =========================
      # STORAGE SETUP
      # =========================
      - name: Ensure storage directory
        run: mkdir -p storage

      # =========================
      # RUN TESTS (SHARDED)
      # =========================
      - name: Run Playwright tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2
        env:
          CI: true

      # =========================
      # DEBUG: ALWAYS UPLOAD REPORTS
      # =========================
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

      # =========================
      # ALLURE RESULTS (SAFE UPLOAD)
      # =========================
      - name: Ensure Allure folder exists
        if: always()
        run: mkdir -p allure-results

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: allure-results/
          retention-days: 7


  # ==========================================
  # JOB 2: ALLURE MERGE REPORT
  # ==========================================
  allure-report:
    name: Allure Report (Merged)
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # NODE SETUP (FIXED)
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # =========================
      # INSTALL PNPM
      # =========================
      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Verify PNPM
        run: pnpm -v

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # =========================
      # DOWNLOAD SHARDS
      # =========================
      - name: Download Shard 1
        uses: actions/download-artifact@v4
        with:
          name: allure-results-shard-1
          path: allure-results-merged

      - name: Download Shard 2
        uses: actions/download-artifact@v4
        with:
          name: allure-results-shard-2
          path: allure-results-merged

      # =========================
      # ENSURE RESULTS EXIST
      # =========================
      - name: Ensure merged results exist
        run: mkdir -p allure-results-merged

      # =========================
      # GENERATE REPORT
      # =========================
      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results-merged --clean -o allure-report

      # =========================
      # UPLOAD REPORT
      # =========================
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7