name: Playwright Test Platform (Enterprise Mode)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

# ==========================================
# TEST FARM (ROBUST + SELF-HEALING)
# ==========================================
  test:
    name: Test Farm (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - uses: actions/checkout@v4

      # =========================
      # NODE SETUP
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Enable Corepack (IMPORTANT FIX)
        run: corepack enable

      # =========================
      # INSTALL DEPENDENCIES (FIXED)
      # =========================
      - name: Install dependencies
        run: |
          npm install -g pnpm@9
          pnpm install --frozen-lockfile

      # =========================
      # INSTALL PLAYWRIGHT (CRITICAL FIX)
      # =========================
      - name: Install Playwright Browsers (FULL SAFE MODE)
        run: pnpm exec playwright install --with-deps

      # =========================
      # VERIFY INSTALL (DEBUG SAFETY)
      # =========================
      - name: Verify Playwright
        run: pnpm exec playwright --version

      # =========================
      # ENV
      # =========================
      - name: Create env
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          EOF

      # =========================
      # RUN TESTS
      # =========================
      - name: Run tests
        run: pnpm exec playwright test \
          --shard=${{ matrix.shard }}/2 \
          --workers=1 \
          --reporter=line
        env:
          CI: true

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results
          retention-days: 5


# ==========================================
# ALLURE AGGREGATION
# ==========================================
  allure-report:
    name: Allure Aggregation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: |
          npm install -g pnpm@9
          pnpm install --frozen-lockfile

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: Validate results
        run: |
          test -d allure-results && ls allure-results

      - name: Generate report
        run: pnpm exec allure generate allure-results --clean -o allure-report

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report


# ==========================================
# DEPLOY
# ==========================================
  deploy:
    name: Deploy Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4