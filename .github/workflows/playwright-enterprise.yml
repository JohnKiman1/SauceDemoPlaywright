name: Playwright Test Platform v2 (Stable Farm Fix)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  pages: write
  id-token: write

# ==========================================
# JOB 1: FARM SETUP (CACHE ONLY)
# ==========================================
jobs:
  setup:
    name: Farm Setup (Browsers Cache)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # Cache browsers for all shards
      - name: Cache Playwright Browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers (if cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium


# ==========================================
# JOB 2: DISTRIBUTED TEST FARM
# ==========================================
  test:
    name: Farm Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    needs: setup

    strategy:
      fail-fast: false
      matrix:
        node: [A, B, C]

    steps:
      - uses: actions/checkout@v4

      # =========================
      # NODE ENV
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # 🔥 CRITICAL FIX (THIS WAS MISSING)
      # =========================
      - name: Install Playwright Runtime (required per node)
        run: |
          pnpm exec playwright install-deps
          pnpm exec playwright install chromium

      # =========================
      # ENV
      # =========================
      - name: Create environment file
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          EOF

      # =========================
      # DEBUG (optional but useful for CI stability)
      # =========================
      - name: Debug environment
        run: |
          node -v
          pnpm exec playwright --version
          ls -la

      # =========================
      # TEST EXECUTION (STABLE MODE)
      # =========================
      - name: Run Playwright tests (farm mode)
        run: |
          pnpm exec playwright test \
            --workers=1 \
            --reporter=line,json \
            --timeout=30000
        env:
          CI: true
          FARM_NODE: ${{ matrix.node }}

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.node }}
          path: allure-results
          retention-days: 5


# ==========================================
# JOB 3: ALLURE AGGREGATION
# ==========================================
  allure-report:
    name: Allure Aggregation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install PNPM + deps
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile --prefer-offline

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results

      # =========================
      # SAFETY CHECK
      # =========================
      - name: Validate results
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results)" ]; then
            echo "❌ No Allure results found"
            exit 1
          fi

      # =========================
      # GENERATE REPORT
      # =========================
      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results --clean -o allure-report

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 5


# ==========================================
# JOB 4: DEPLOY
# ==========================================
  deploy:
    name: Deploy Test Platform
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4