name: Playwright Test Platform (Enterprise Mode)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

# ==========================================
# TEST FARM (SELF-CONTAINED NODES)
# ==========================================
  test:
    name: Test Farm (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - uses: actions/checkout@v4

      # =========================
      # NODE + PNPM
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # PLAYWRIGHT CACHE (FIXED)
      # =========================
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      # =========================
      # INSTALL PLAYWRIGHT (NO HANGS VERSION)
      # =========================
      - name: Install Playwright browsers (safe mode)
        run: pnpm exec playwright install

      # =========================
      # ENV
      # =========================
      - name: Create env
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          EOF

      # =========================
      # TEST EXECUTION
      # =========================
      - name: Run tests
        run: pnpm exec playwright test \
          --shard=${{ matrix.shard }}/2 \
          --workers=1
        env:
          CI: true

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results
          retention-days: 5


# ==========================================
# ALLURE REPORT
# ==========================================
  allure-report:
    name: Allure Aggregation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          npm install -g pnpm@9
          pnpm install --frozen-lockfile

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: Validate results
        run: test -d allure-results && ls allure-results

      - name: Generate report
        run: pnpm exec allure generate allure-results --clean -o allure-report

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report


# ==========================================
# DEPLOY
# ==========================================
  deploy:
    name: Deploy Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4