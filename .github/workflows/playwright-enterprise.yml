name: Playwright Test Platform (Enterprise Mode)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write


# ==========================================
# JOB 1: SETUP (CACHE + BROWSERS ONCE)
# ==========================================
jobs:
  setup:
    name: Setup Playwright Environment
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # CACHE BROWSERS
      # =========================
      - name: Cache Playwright Browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-v2-${{ hashFiles('**/pnpm-lock.yaml') }}

      # =========================
      # INSTALL ONLY IF NEEDED
      # =========================
      - name: Install Playwright Browsers (safe)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Verify browsers
        run: pnpm exec playwright install --dry-run


# ==========================================
# JOB 2: TEST FARM (SHARDED EXECUTION)
# ==========================================
  test:
    name: Test Farm Shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: setup

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # RESTORE BROWSERS CACHE
      # =========================
      - name: Restore Playwright Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-v2-${{ hashFiles('**/pnpm-lock.yaml') }}

      # =========================
      # SHARD-SAFE STORAGE FIX (CRITICAL)
      # =========================
      - name: Prepare storage isolation
        run: mkdir -p storage

      - name: Create env (shard-aware)
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          PLAYWRIGHT_SHARD=${{ matrix.shard }}
          EOF

      # =========================
      # TEST EXECUTION (FIXED SHARD)
      # =========================
      - name: Run tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2 --workers=1
        env:
          CI: true
          PLAYWRIGHT_SHARD: ${{ matrix.shard }}

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results
          retention-days: 5


# ==========================================
# JOB 3: PR PREVIEW + ALLURE AGGREGATION
# ==========================================
  allure-report:
    name: PR Preview Report
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM + deps
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # DOWNLOAD SHARD RESULTS
      # =========================
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      # =========================
      # GUARANTEE RESULTS EXIST
      # =========================
      - name: Validate results
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results)" ]; then
            echo "❌ No results found"
            exit 1
          fi

      # =========================
      # GENERATE REPORT
      # =========================
      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results --clean -o allure-report

      # =========================
      # UPLOAD PR PREVIEW ARTIFACT
      # =========================
      - name: Upload PR Report
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-report
          path: allure-report


# ==========================================
# JOB 4: DEPLOY (MAIN ONLY)
# ==========================================
  deploy:
    name: Deploy Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: pr-preview-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4