name: Playwright Enterprise Tests (Ultra Fast CI)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

# ==========================================
# JOB 1: TEST EXECUTION (STABLE SHARDING)
# ==========================================
  test:
    name: E2E Tests (Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # NODE + FAST INSTALL
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies (fast mode)
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # PLAYWRIGHT CACHE (FIXED)
      # =========================
      - name: Cache Playwright Browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers (only if cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      # =========================
      # ENV SETUP
      # =========================
      - name: Create env
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          EOF

      # =========================
      # TEST EXECUTION (SHARD SAFE)
      # =========================
      - name: Run tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2 --workers=1
        env:
          CI: true

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results/
          retention-days: 5


# ==========================================
# JOB 2: ALLURE REPORT (SAFE MERGE)
# ==========================================
  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install PNPM + deps
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # DOWNLOAD RESULTS
      # =========================
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      # =========================
      # SAFETY CHECK (FIX FOR YOUR "NO RESULTS")
      # =========================
      - name: Validate results exist
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results)" ]; then
            echo "❌ No Allure results found"
            exit 1
          fi

      # =========================
      # GENERATE REPORT
      # =========================
      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results --clean -o allure-report

      # =========================
      # UPLOAD REPORT
      # =========================
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 5


# ==========================================
# JOB 3: DEPLOY
# ==========================================
  publish-report:
    name: Deploy Allure Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4