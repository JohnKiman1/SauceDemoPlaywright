name: Playwright Test Platform (Enterprise Mode)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CI: true


# ==========================================
# JOB 0: AUTH STATE GENERATION (CRITICAL FIX)
# ==========================================
jobs:

  auth:
    name: Generate Auth State
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # INSTALL ONLY CHROMIUM FOR LOGIN (FAST + STABLE)
      # =========================
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      # =========================
      # RUN SMOKE LOGIN TO GENERATE STORAGE STATE
      # =========================
      - name: Generate auth state
        run: pnpm exec playwright test --project=chromium --grep "@smoke" --workers=1

      # =========================
      # UPLOAD AUTH STATE
      # =========================
      - name: Upload auth state
        uses: actions/upload-artifact@v4
        with:
          name: auth-state
          path: storage/auth.json
          retention-days: 1


# ==========================================
# JOB 1: TEST FARM (SHARDED EXECUTION)
# ==========================================
  test:
    name: Test Farm Shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: auth

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - uses: actions/checkout@v4

      # =========================
      # NODE
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # INSTALL BROWSERS (ALL FOR TESTING)
      # =========================
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      # =========================
      # DOWNLOAD AUTH STATE (CRITICAL FIX)
      # =========================
      - name: Download auth state
        uses: actions/download-artifact@v4
        with:
          name: auth-state
          path: storage

      # =========================
      # DEBUG SAFETY
      # =========================
      - name: Debug environment
        run: |
          echo "CI=$CI"
          ls -la
          ls -la storage || true

      # =========================
      # RUN SHARDED TESTS
      # =========================
      - name: Run tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2 --workers=1
        env:
          CI: true

      # =========================
      # ALLURE RESULTS
      # =========================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results
          retention-days: 5


# ==========================================
# JOB 2: ALLURE REPORT
# ==========================================
  allure-report:
    name: Allure Aggregation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM + deps
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile --prefer-offline

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: Validate results exist
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results)" ]; then
            echo "❌ No Allure results found"
            exit 1
          fi

      - name: Restore history
        run: |
          git clone --depth=1 --branch=gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p allure-results/history
          cp -r gh-pages/history/* allure-results/history/ || true

      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results --clean -o allure-report

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report


# ==========================================
# JOB 3: DEPLOY REPORT
# ==========================================
  deploy:
    name: Deploy Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4