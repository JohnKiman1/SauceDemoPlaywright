name: Playwright Test Platform (Enterprise Mode)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 * * * *"   # every hour

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

# ==========================================
# JOB 0: PLAYWRIGHT SETUP (CRITICAL FIX)
# ==========================================
  setup:
    name: Setup Playwright Browsers
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Generate cache key
        id: cache-key
        run: echo "key=pw-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ steps.cache-key.outputs.key }}

      - name: Install ALL browsers (FIX FOR YOUR ERROR)
        run: pnpm exec playwright install --with-deps chromium firefox webkit


# ==========================================
# JOB 1: TEST FARM
# ==========================================
  test:
    name: Test Farm (${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: setup

    strategy:
      fail-fast: false
      matrix:
        node: [1, 2]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # DO NOT reinstall browsers here (FIX)
      # =========================
      - name: Restore Playwright Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      # =========================
      # ENV
      # =========================
      - name: Create env
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          EOF

      # =========================
      # TEST EXECUTION (SAFE SHARDING)
      # =========================
      - name: Run tests
        run: pnpm exec playwright test \
          --shard=${{ matrix.node }}/2 \
          --workers=1
        env:
          CI: true

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.node }}
          path: allure-results
          retention-days: 5


# ==========================================
# JOB 2: ALLURE REPORT
# ==========================================
  allure-report:
    name: Allure Aggregation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install PNPM + deps
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      # =========================
      # FIX: prevent empty report failure
      # =========================
      - name: Validate results exist
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results)" ]; then
            echo "❌ No Allure results found"
            exit 1
          fi

      # =========================
      # HISTORY (SAFE)
      # =========================
      - name: Restore history
        run: |
          git clone --depth=1 --branch=gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p allure-results/history
          cp -r gh-pages/history/* allure-results/history/ || true

      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results --clean -o allure-report

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report


# ==========================================
# JOB 3: DEPLOY
# ==========================================
  deploy:
    name: Deploy Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4