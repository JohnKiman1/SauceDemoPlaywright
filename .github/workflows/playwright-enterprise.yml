name: Playwright Enterprise Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  # ==========================================
  # JOB 1: TEST EXECUTION
  # ==========================================
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Create .env file
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          EOF

      - name: Ensure storage directory
        run: mkdir -p storage

      - name: Run Playwright tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2
        env:
          CI: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: allure-results/
          retention-days: 7


  # ==========================================
  # JOB 2: BUILD ALLURE REPORT (WITH HISTORY)
  # ==========================================
  allure-report:
    name: Allure Report (Merged)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-shard-*
          path: allure-results-merged
          merge-multiple: true

      # ==========================================
      # 🔥 FIXED HISTORY SUPPORT (SAFE FIRST RUN)
      # ==========================================
      - name: Download Allure history
        uses: actions/download-artifact@v4
        with:
          name: allure-history
          path: allure-results-merged/history
        continue-on-error: true

      - name: Ensure history directory exists
        run: mkdir -p allure-results-merged/history

      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results-merged --clean -o allure-report

      # Save history for next run
      - name: Save Allure history
        run: |
          mkdir -p allure-history
          cp -r allure-report/history/* allure-history/ || true

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7

      - name: Upload Allure History
        uses: actions/upload-artifact@v4
        with:
          name: allure-history
          path: allure-history/
          retention-days: 30


  # ==========================================
  # JOB 3: DEPLOY TO GITHUB PAGES
  # ==========================================
  publish-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4