name: Playwright Enterprise Test Farm (Stable CI)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

# ==========================================
# JOB 0: BROWSER SETUP (RUNS ONCE ONLY)
# ==========================================
  setup:
    name: Setup Playwright Browsers
    runs-on: ubuntu-latest

    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # PLAYWRIGHT CACHE
      # =========================
      - name: Cache Playwright Browsers
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}

      - name: Install Playwright Browsers (ONLY ON MISS)
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps


# ==========================================
# JOB 1: TEST EXECUTION (FARM SHARDS)
# ==========================================
  test:
    name: Test Farm Shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies (fast mode)
        run: pnpm install --frozen-lockfile --prefer-offline

      # 🚨 IMPORTANT: NO PLAYWRIGHT INSTALL HERE ANYMORE

      - name: Create .env
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          EOF

      # ==========================================
      # EXECUTION (TRUE FARM MODE)
      # ==========================================
      - name: Run tests (sharded execution)
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2 --workers=1
        env:
          CI: true

      # ==========================================
      # ARTIFACTS (ISOLATED PER SHARD)
      # ==========================================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results
          retention-days: 5


# ==========================================
# JOB 2: ALLURE MERGE + HISTORY
# ==========================================
  allure-report:
    name: Allure Report (Farm Aggregation)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # ==========================================
      # DOWNLOAD SHARD RESULTS
      # ==========================================
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-merged
          merge-multiple: true

      # ==========================================
      # HISTORY FROM GH-PAGES (SAFE)
      # ==========================================
      - name: Restore Allure history
        run: |
          git clone --depth=1 --branch=gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p allure-results-merged/history

          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history/* allure-results-merged/history/ || true
          fi

      # ==========================================
      # GENERATE REPORT
      # ==========================================
      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results-merged --clean -o allure-report

      # ==========================================
      # UPLOAD REPORT
      # ==========================================
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 7


# ==========================================
# JOB 3: DEPLOY TO GITHUB PAGES
# ==========================================
  publish-report:
    name: Deploy Allure Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4