name: Playwright Enterprise Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ==========================================
  # TEST EXECUTION (SHARDED)
  # ==========================================
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      # =========================
      # FIXED TOOLCHAIN (COREPACK ONLY)
      # =========================
      - name: Enable Corepack
        run: corepack enable

      - name: Activate PNPM
        run: corepack prepare pnpm@latest --activate

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # =========================
      # PLAYWRIGHT BROWSERS
      # =========================
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      # =========================
      # PREP STORAGE
      # =========================
      - name: Ensure storage directory
        run: mkdir -p storage

      # =========================
      # RUN TESTS
      # =========================
      - name: Run Playwright tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2
        env:
          CI: true
          BASE_URL: https://www.saucedemo.com
          USERNAME: standard_user
          PASSWORD: secret_sauce

      # =========================
      # ALLURE RAW RESULTS
      # =========================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: allure-results/
          retention-days: 7


  # ==========================================
  # ALLURE MERGE + REPORT
  # ==========================================
  allure-report:
    name: Allure Report (Merged)
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable Corepack
        run: corepack enable

      - name: Activate PNPM
        run: corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # =========================
      # DOWNLOAD SHARDS
      # =========================
      - name: Download Shard 1
        uses: actions/download-artifact@v4
        with:
          name: allure-results-shard-1
          path: allure-results-merged

      - name: Download Shard 2
        uses: actions/download-artifact@v4
        with:
          name: allure-results-shard-2
          path: allure-results-merged

      # =========================
      # GENERATE REPORT
      # =========================
      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results-merged --clean -o allure-report

      # =========================
      # PUBLISH ARTIFACT
      # =========================
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7