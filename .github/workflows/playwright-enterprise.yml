name: Playwright Enterprise Tests (Ultra Fast CI)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

# ==========================================
# JOB 1: TEST EXECUTION (ULTRA FAST)
# ==========================================
  test:
    name: E2E Tests (Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # NODE (FAST + CLEAN CACHE)
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies (FAST MODE)
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # PLAYWRIGHT BROWSER CACHE (MAJOR SPEED BOOST)
      # =========================
      - name: Cache Playwright Browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers (only if cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      # =========================
      # ENV SETUP (MINIMAL COST)
      # =========================
      - name: Create .env file
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          USERNAME=standard_user
          PASSWORD=secret_sauce
          EOF

      - name: Ensure storage directory
        run: mkdir -p storage

      # =========================
      # TEST EXECUTION (FAST SHARD MODE)
      # =========================
      - name: Run Playwright tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2 --workers=2 --reporter=line
        env:
          CI: true

      # =========================
      # ARTIFACTS (MINIMAL SIZE)
      # =========================
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 5

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results/
          retention-days: 5


# ==========================================
# JOB 2: ALLURE REPORT (FAST MERGE)
# ==========================================
  allure-report:
    name: Allure Report (Fast Merge)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PNPM
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # =========================
      # DOWNLOAD TEST RESULTS
      # =========================
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-merged
          merge-multiple: true

      # =========================
      # HISTORY (FAST & SAFE)
      # =========================
      - name: Restore history (gh-pages lightweight fetch)
        run: |
          git clone --depth=1 --branch=gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p allure-results-merged/history
          cp -r gh-pages/history/* allure-results-merged/history/ || true

      # =========================
      # GENERATE REPORT
      # =========================
      - name: Generate Allure Report
        run: pnpm exec allure generate allure-results-merged --clean -o allure-report

      # =========================
      # SAVE HISTORY
      # =========================
      - name: Extract history
        run: |
          mkdir -p history-out
          cp -r allure-report/history/* history-out/ || true

      # =========================
      # UPLOAD REPORT
      # =========================
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 5


# ==========================================
# JOB 3: DEPLOY (GITHUB PAGES)
# ==========================================
  publish-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4